<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LE LOFT — Barber Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght=0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-fond:       #0a0804;
      --color-texte:      #f5f0e8;
      --color-accent:     #c8a96e;
      --color-rouge:      #8b3a2f;
      --color-fond-clair: #1a1410;
      --color-gris:       #7a6e5f;
      --police-titre:  'Bebas Neue', sans-serif;
      --police-texte:  'Cormorant Garamond', serif;
      --police-label:  'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--color-fond);
      color: var(--color-texte);
      font-family: var(--police-texte);
      cursor: none;
      overflow-x: hidden;
    }

    .cursor {
      position: fixed; top: 0; left: 0;
      width: 12px; height: 12px;
      background: var(--color-accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, background 0.3s;
      mix-blend-mode: difference;
    }
    .cursor.big { width: 40px; height: 40px; background: var(--color-texte); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.8rem 4rem;
      mix-blend-mode: difference;
    }

    .nav-logo {
      font-family: var(--police-titre);
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: var(--color-texte);
    }

    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-family: var(--police-label);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-texte);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .nav-links a:hover { opacity: 1; }

    #hero {
      position: relative;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 5rem 4rem;
      position: relative;
      z-index: 2;
    }

    .hero-tag {
      font-family: var(--police-label);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--color-accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    .hero-title {
      font-family: var(--police-titre);
      font-size: clamp(5rem, 10vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--color-texte);
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards;
    }
    .hero-title .outline {
      -webkit-text-stroke: 1px var(--color-accent);
      color: transparent;
    }

    .hero-desc {
      margin-top: 2rem;
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      color: var(--color-gris);
      max-width: 340px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }

    .hero-cta {
      margin-top: 3rem;
      display: inline-block;
      font-family: var(--police-label);
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-fond);
      background: var(--color-accent);
      padding: 1.1rem 2.5rem;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
      opacity: 0;
      animation: fadeUp 1s 1s forwards;
    }
    .hero-cta:hover { background: var(--color-texte); }

    .hero-right {
      position: relative;
      overflow: hidden;
    }

    .hero-image-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 50%, #0a0804 100%);
    }

    .hero-pattern {
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(200,169,110,0.04) 20px, rgba(200,169,110,0.04) 21px),
        repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(200,169,110,0.04) 20px, rgba(200,169,110,0.04) 21px);
    }

    .hero-badge {
      position: absolute;
      bottom: 4rem; right: 4rem;
      width: 130px; height: 130px;
      border: 1px solid var(--color-accent);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      animation: rotateBadge 20s linear infinite;
    }
    .hero-badge span {
      font-family: var(--police-titre);
      font-size: 2rem;
      color: var(--color-accent);
      line-height: 1;
    }
    .hero-badge small {
      font-family: var(--police-label);
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      color: var(--color-gris);
      text-transform: uppercase;
    }

    .scissors-deco {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      color: rgba(200,169,110,0.08);
      animation: float 6s ease-in-out infinite;
    }

    .marquee-wrap {
      overflow: hidden;
      background: var(--color-accent);
      padding: 1rem 0;
    }
    .marquee-track {
      display: flex;
      gap: 3rem;
      animation: marquee 18s linear infinite;
      white-space: nowrap;
    }
    .marquee-item {
      font-family: var(--police-titre);
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--color-fond);
      flex-shrink: 0;
    }
    .marquee-dot { color: var(--color-rouge); }

    /* ========================================= */
    /* NOUEAUX STYLES POUR GRILLE SERVICES ILLUSTRÉE */
    /* ========================================= */
    #services {
      padding: 8rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--police-label);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--color-accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
    }

    .section-title {
      font-family: var(--police-titre);
      font-size: clamp(3rem, 6vw, 5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 5rem;
      text-align: center;
    }
    .section-title .accent { color: var(--color-accent); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .service-card {
      background: var(--color-fond-clair);
      border: 1px solid rgba(200,169,110,0.1);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, border-color 0.4s ease;
      display: flex;
      flex-direction: column;
    }

    .service-card:hover {
      transform: translateY(-10px);
      border-color: rgba(200,169,110,0.4);
    }

    /* Conteneur de l'image pour le style N&B */
    .service-image-wrap {
      width: 100%;
      aspect-ratio: 16/10; /* Format paysage pour la grille */
      overflow: hidden;
      position: relative;
    }

    .service-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Style N&B comme la première page */
      filter: grayscale(100%) contrast(110%) brightness(90%);
      transition: filter 0.5s ease, transform 0.5s ease;
    }

    .service-card:hover .service-image-wrap img {
      filter: grayscale(0%) contrast(100%) brightness(100%);
      transform: scale(1.05);
    }

    /* Overlay dégradé sur l'image */
